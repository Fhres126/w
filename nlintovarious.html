      function whethernl(p){
        if(/^[zqjxkvbpfcldrsnt]+$/.test(p)&&convertintobinary(p).length%8==0){
          return true;
        }else{
          return false;
        }
        
      }
      
      
      
      function convertintobinary(p) {
          return p.replace(/z/g, '0000')
            .replace(/q/g, '1000')
            .replace(/j/g, '0100')
            .replace(/x/g, '1100')
            .replace(/k/g, '0010')
            .replace(/v/g, '1010')
            .replace(/b/g, '0110')
            .replace(/p/g, '1110')
            .replace(/f/g, '0001')
            .replace(/c/g, '1001')
            .replace(/l/g, '0101')
            .replace(/d/g, '1101')
            .replace(/r/g, '0011')
            .replace(/s/g, '1011')
            .replace(/n/g, '0111').
            replace(/t/g, '1111');
      }
      
      function convertintoletter(p){
       const binaryMap = {
         '0000': 'z', '1000': 'q', '0100': 'j', '1100': 'x',
         '0010': 'k', '1010': 'v', '0110': 'b', '1110': 'p',
         '0001': 'f', '1001': 'c', '0101': 'l', '1101': 'd',
         '0011': 'r', '1011': 's', '0111': 'n', '1111': 't'
       };
     
     
       return p.replace(/[01]{4}/g, (match) => binaryMap[match] || match);
      }
      
      function makenlqr1(p){
      
        nlqr1txt='10'+p;

        }else{

        }
        
     
     
     
     
        let shortercellnlqr1;
        
        if(nlqr1txt>lineratio){
          shortercellnlqr1=cellsize*lineratio;
        }else{
          shortercellnlqr1=cellsize*nlqr1txt;
        }
        
        shellsize = shellratio * shortercellnlqr1;
     
        nlqr1canvas.width= cellsize * nlqr1txt.length + shellsize*2;
        
        nlqr1canvas.height=lineratio*cellsize + shellsize * 2;
        
     
        
        
        
        
        
        
        
        nlqr1ctx.clearRect(0,0,nlqr1canvas.width, nlqr1canvas.height);
        
        if(whetherfillbackground){
          if(whetherinversecolor){
            nlqr1ctx.fillStyle=`#FFFFFF`;
          }else{

          }
          nlqr1ctx.fillRect(0,0,nlqr1canvas.width,nlqr1canvas.height);
        }
        
        
        for(let i=0;i<nlqr1txt.length;i++){
          if(nlqr1txt[i]=='1'){
            if(whetherinversecolor){
              nlqr1ctx.fillStyle='#000000';
            }else{
              nlqr1ctx.fillStyle='#ffffff';
            }
            
          
            nlqr1ctx.fillRect(shellsize + i * cellsize, shellsize, cellsize, cellsize * lineratio);
          
          }
          
            
          
        }
        
        setsize();
        
      }
      
      function makenlqr2(p){
        
        let nlqr2ctx=nlqr2canvas.getContext('2d');
        
        
        if(whethercomfortablyreadnlqr2){
          
          if(nlqr2length>8){
            nlqr2txt='10111'+'0'.repeat(nlqr2length-7)+'11' +p;
            
          }else{
            nlqr2txt='10100001'+p;
          }
        }else{
          if(nlqr2length>8){
            nlqr2txt='1011'+"0".repeat(nlqr2length-6)+'11'+p;
          }else{
            nlqr2txt='10000011'+p;
          }
          
        }
        
        
        let shortercellnlqr2;
        
        if(nlqr2txt.length/nlqr2length>nlqr2length){
          shortercellnlqr2=nlqr2length;
        }else{
          shortercellnlqr2=nlqr2txt.length/nlqr2length;
        }
        
        let shellsize=shellratio * cellsize * shortercellnlqr2;
        
        
        nlqr2canvas.width=parseInt(Math.ceil(nlqr2txt.length/nlqr2length)*cellsize + (shortercellnlqr2 * cellsize * shellratio * 2));
        
        nlqr2canvas.height=nlqr2length * cellsize + shellsize * 2;
        
        let nlqr2smallerline;
        
        if(nlqr2canvas.width>nlqr2canvas.height){
          nlqr2smallerline=parseInt(nlqr2canvas.height);
        }else{
          nlqr2smallerline=parseInt(nlqr2canvas.width);
        }
        
        
        nlqr2ctx.clearRect(0,0,nlqr2canvas.width, nlqr2canvas.height);
        
        if(whetherfillbackground){
          if(whetherinversecolor){
            nlqr2ctx.fillStyle='#ffffff';
            nlqr2ctx.fillRect(0,0,nlqr2canvas.width,nlqr2canvas.height);
          }else{
            nlqr2ctx.fillStyle='#000000';
            nlqr2ctx.fillRect(0,0,nlqr2canvas.width,nlqr2canvas.height);
          }
        }
        
        for(let i=0;i<nlqr2txt.length;i++){
          
          if(nlqr2txt[i]=='1'){
            
            if(whetherinversecolor){
              nlqr2ctx.fillStyle='#000000';
            }else{
              nlqr2ctx.fillStyle='#ffffff';
            }
            
            
            nlqr2ctx.fillRect(shellsize + Math.floor(i / nlqr2length) * cellsize, nlqr2canvas.height - shellsize - ((i%nlqr2length) * cellsize) - cellsize, cellsize, cellsize);
            
          }
        }
        
      }
      
      function makenlqr3(p){
       let nlqr3ctx=nlqr3canvas.getContext('2d');
        
        
       if(whethercomfortablyreadnlqr2){
          
          if(nlqr2length>8){
            nlqr3txt='10111'+'0'.repeat(nlqr2length-7)+'11' +p;
            
          }else{
            nlqr3txt='10100001'+p;
          }
        }else{
          if(nlqr2length>8){
            nlqr3txt='1011'+"0".repeat(nlqr2length-6)+'11'+p;
          }else{
            nlqr3txt='10000011'+p;
          }
          
        }
        
        
        let shortercellnlqr3;
        
        if(Math.ceil(nlqr3txt.length/nlqr2length/3)>nlqr2length){
          shortercellnlqr3=nlqr2length;
        }else{
          shortercellnlqr3=Math.ceil(nlqr3txt.length/nlqr2length/3);
        }
        
        let shellsize=shellratio * cellsize * shortercellnlqr3;
        
        
        let mapnlqr3=new Array(Math.ceil(nlqr3txt.length / 3) * 8);
        
        mapnlqr3.fill("")
        
        for(let i=0;i<nlqr3txt.length;i++){
         if(Math.floor(i/8)%3==0){
          if(nlqr3txt[i]=="1"){
           mapnlqr3[(Math.floor(i/24)*8)+i%8] += "r"
          }
         }
         if(Math.floor(i/8)%3==1){
           if(nlqr3txt[i]=="1"){
           mapnlqr3[(Math.floor(i/24)*8)+i%8] += "g"
          }
         }
         if(Math.floor(i/8)%3==2){
          if(nlqr3txt[i]=="1"){
           mapnlqr3[(Math.floor(i/24)*8)+i%8] += "b"
          }
         }
        }
        
        nlqr3canvas.width=Math.ceil(Math.ceil(nlqr3txt.length/nlqr2length/3)*cellsize + (shortercellnlqr3 * cellsize * shellratio * 2));
        
        nlqr3canvas.height=nlqr2length * cellsize + shellsize * 2;
        
        let nlqr3smallerline;
        
        if(nlqr3canvas.width>nlqr3canvas.height){
          nlqr3smallerline=parseInt(nlqr3canvas.height);
        }else{
          nlqr3smallerline=parseInt(nlqr3canvas.width);
        }
        
        
        nlqr3ctx.clearRect(0,0,nlqr3canvas.width, nlqr3canvas.height);
        
        
        for(let i=0;i<mapnlqr3.length;i++){
         let whetherred=0;
         let whethergreen=0;
         let whetherblue=0;
         if(mapnlqr3[i].includes("r")){
          whetherred = 1;
         }
         if(mapnlqr3[i].includes("g")){
          whethergreen = 1;
         }
         if(mapnlqr3[i].includes("b")){
          whetherblue = 1;
         }
         
         nlqr3ctx.fillStyle = `rgb(${whetherred * 255}, ${whethergreen * 255}, ${whetherblue * 255})`
         
         let whetherdontfill=false;
         
         if(whetherfillbackground){
           if(whetherred==0&&whethergreen==0&&whetherblue==0){
            if(whetherinversecolor){
             nlqr3ctx.fillStyle="#ffffff"
            }else{
             nlqr3ctx.fillStyle="#000000"
            }
           }else if(whetherred==1&&whethergreen==1&&whetherblue==1){
            if(whetherinversecolor){
             nlqr3ctx.fillStyle="#000000"
            }else{
             nlqr3ctx.fillStyle="#ffffff"
            }
           }
          }else if(whetherred==0&&whethergreen==0&&whetherblue==0){
           whetherdontfill=true;
          }
          
          if(whetherdontfill){
           
          }else{
           nlqr3ctx.fillRect(shellsize + Math.floor(i / nlqr2length) * cellsize, nlqr3canvas.height - shellsize - ((i%nlqr2length) * cellsize) - cellsize, cellsize, cellsize);
          }
          
        }
        
        
        
        nlqr3ctx.globalCompositeOperation = 'destination-over';
        if(whetherfillbackground){
         if(whetherinversecolor){
          nlqr3ctx.fillStyle="#000000"
          nlqr3ctx.fillRect(shellsize,shellsize,nlqr3canvas.width-2*shellsize, nlqr3canvas.height-2*shellsize);
          nlqr3ctx.fillStyle="#ffffff"
         }else{
          
          nlqr3ctx.fillStyle="#000000"
         }
         nlqr3ctx.fillRect(0,0,nlqr3canvas.width, nlqr3canvas.height)
        }
      }
