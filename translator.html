    function vlettertobit(p){
      function apTo4bit(ch){
        const n = ch.charCodeAt(0) - 97;

        if(n < 0 || n > 15) return null;
      
        return n.toString(2).padStart(4,'0').split('').reverse().join('');
      
      }
  
      return [...p].map(apTo4bit).join('') ;
    }
    
    
    
    
    
    function vbittoletter(p){
          
      let resultletter = '';
    
      for(let i = 0; i < p.length; i += 4){
        let j = 0;
        if(p[i]   === '1') j += 1;
        if(p[i+1] === '1') j += 2;
        if(p[i+2] === '1') j += 4;
        if(p[i+3] === '1') j += 8;
    
        resultletter += String.fromCharCode(97 + j);
      }
      return resultletter;
    }

     function engtoreadable(p){
      
      lefthandside=''
      
      righthandside=''
      
      let plocationofaloneverb = new Array()
      
      let pstructureofinputeng=nlp(p).json();
      
      let ptypeofengsentence=new Array();
      
      //gettypeofengsentence(inputtext);
      
      for(let i=0;i<pstructureofinputeng.length;i++){
        for(let j=0;j<pstructureofinputeng[i].terms.length;j++){
          if(pstructureofinputeng[i].terms[j].tags[0] == 'Verb'){
            if(j==0){
              plocationofaloneverb.push(j);
              break;
            }else{
              if(pstructureofinputeng[i].terms[j].tags[1] != 'Possessive'){
                plocationofaloneverb.push(j)
                break;
              }
            }
          }
        }
        
        
        if(plocationofaloneverb.length===0){
          alert('cant find alone verb')
        }else{
          for(let i=0;i<plocationofaloneverb.length;i++){
            if(plocationofaloneverb[i] == 0){
              ptypeofengsentence.push('command')
            }else if(1 < pstructureofinputeng[i].terms.length){
              ptypeofengsentence.push('assert');
            }else if(pstructureofinputeng[i].includes('?')){
              ptypeofengsentence.push('ask')
            }else{
             alert('cant get type of sentence')
            }
          }
        }
       }
       
       return [pstructureofinputeng, ptypeofengsentence, plocationofaloneverb]
      }



   function vdictoreadable(){
      
      for(let i=0;i<dic.length;i++){
        
        if(dic[i].includes('=')&&dic[i].includes('.')){
          
          vdic[i]=[dic[i].substring(0, dic[i].indexOf(' ')).trim(),
          
          dic[i].substring(dic[i].indexOf(' ') + 1, dic[i].indexOf('!')).trim().split(','),
          
          dic[i].substring(dic[i].indexOf('!') + 1, dic[i].indexOf('=')).trim(),
          
          dic[i].substring(dic[i].indexOf('=') + 1,dic[i].indexOf('.')).trim()];
          
          let arrayvdicformular = vdic[i][3].split(' ')
          
          let quantityofspaceineachworddic = arrayvdicformular.length - 1;
          
          if(0 < quantityofspaceineachworddic){
            vdic[i][3] = vdic[i][3].replaceAll('thing', '');
          }
          if(1 < quantityofspaceineachworddic){
            vdic[i][3] = vdic[i][3].replaceAll('that', '');
            
            vdic[i][3] = vdic[i][3].replaceAll('be', '');
            
            vdic[i][3] = vdic[i][3].replaceAll('probability', '');
            
            vdic[i][3] = vdic[i][3].replaceAll('intensity', '');
            
            vdic[i][3] = vdic[i][3].replaceAll('is', '');
            
            vdic[i][3] = vdic[i][3].replaceAll('percent', '');
            
            
            vdic[i][3] = vdic[i][3].replaceAll('about', '');
          }
          if(3 < quantityofspaceineachworddic){
            vdic[i][3] = vdic[i][3].replaceAll('with', '');
            
            vdic[i][3] = vdic[i][3].replaceAll('percent', '');
            
            
            vdic[i][3] = vdic[i][3].replaceAll('to', '');
          }
          
          if(4 < quantityofspaceineachworddic){
            vdic[i][3] = vdic[i][3].replaceAll('by', '');
          }
          
          let worddictdonthavex = new Array();
          
          arrayvdicformular = vdic[i][3].split(' ')
          
          for(let j = 0; j < quantityofspaceineachworddic+1;j++){
            if(!/^\d+$/.test(arrayvdicformular[j].replaceAll('x',''))){
              
              worddictdonthavex.push(arrayvdicformular[j])
            }
          }
          
          vdic[i][3] = worddictdonthavex.join(' ');
          
          vdic[i][3] = vdic[i][3].trim();
          
          //alert(vdic[i][3])
          
        }
        
      }
      console.log(vdic)      
    }
    







    function playtts(p) {

      }
    }

    function stopspeak() {
        window.speechSynthesis.cancel();

    function combine(str){
      const chars = [...str];
      const cho = CHO.indexOf(chars[0]);
      const jung = JUNG.indexOf(chars[1]);
      const jong = chars[2] ? JONG.indexOf(chars[2]) : 0;
      return String.fromCharCode(44032 + (cho*588) + (jung*28) + jong);
    }
