<!DOCTYPE html><html lang="en">
<head>
  <link rel="icon" type="image/png" href="https://fhres126.github.io/w/lookingforword.png">
  <meta charset="UTF-8">
  <title>search veluil word</title>
    <style>
     :root {
      --s: "0";
     }
    body { font-family: sans-serif; padding: 20px; color:#FFFFFF; background:#000000}
    input, button { padding: 8px; margin: 6px 0; font-size: 14px }
    .result { margin-top: 15px; }
    pre { 
     background:#008800;
     padding:10px;
     border-radius:6px;
     display:inline-block;
     display: block;
     white-space: pre-wrap;
     word-break: break-all;
     font-size: 1.5vh;
     
    }
  </style>
</head>
<body>
  <h1>search veluil word</h1>
  <div>search verb instead of Interjection and adverb(eg hello->greet)</div>
  <input type="text" id="searchInput">
  <button onclick="searchWord()">search</button>  <div class="result" id="result"></div>  
  <script>
   
    
    
    let dic=``;
    let lines=``;
    
    const url = "https://raw.githubusercontent.com/Fhres126/w/main/co.txt";

        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error("we met error we cant find txt file.");
                return response.text();
            })
            .then(text => {
                dic=text;
                dic=dic.substring(dic.indexOf('//ewo'), dic.indexOf('//eewo'));
                lines = dic.split(/\r?\n/);
            })
            .catch(err => {
                dic=err;
                lines = dic.split(/\r?\n/);
            });
    function searchWord() {
      let inputRaw = document.getElementById("searchInput").value.trim();
      let resultDiv = document.getElementById("result");
      resultDiv.innerHTML = "";

      if (!inputRaw) {
        resultDiv.innerHTML = "search";
        return;
      }

      let input = inputRaw;
      let results = [];

      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        if (!line) continue;

        let parts = line.split('=');
        if (parts.length < 2) continue;

        let rhs = parts.slice(0).join('');

        let beforeDot = rhs.split('.')[0];

        let tokens = beforeDot.split(/[^A-Za-z0]+/).filter(Boolean);

        let matched = false;
        for (let t of tokens) {
          if (t.includes(input)) { 
            matched = true;
            break;
          }
        }

        if (matched) {
          results.push(line.trim());
        }
      }

      if (results.length > 0){
        let unique = [...new Set(results)];
        resultDiv.innerHTML = `<b>srarch result:</b><br>` + unique.map(r => `<pre>${r}</pre>`).join('');} else {
       resultDiv.innerHTML = "result is undefined";
     }
   }

   let width=window.innerWidth;
    let height=window.innerHeight;
    let smallerline;
    if(width>height){
      smallerline=height;
    }else{
      smallerline=width;
    }
    document.documentElement.style.setProperty("--s", String(smallerline));
    
    document.getElementById("searchInput").style.width=String(Number(getComputedStyle(document.documentElement).getPropertyValue("--s"))/2)+"px";
  </script>
</body>
</html>
