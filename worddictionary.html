<!DOCTYPE html><html lang="en">
<head>
  <link rel="icon" type="image/png" href="https://fhres126.github.io/w/lookingforword.png">
  <meta charset="UTF-8">
  <title>search veluil word</title>
    <style>
     :root {
      --s: "0";
      --fontsize:"0"
     }
    html{
     font-size: var(--fontsize);
    }
    *{
     font-size: 1rem;
    }
    body {
     font-family: sans-serif;
     padding: 20px;
     color:#FFFFFF;
     background:#000000;
     height: 400vh;
    }
    
    button {
     padding: 8px;
     margin: 6px 0;
     position: fixed;
     
    }
    input{
     position:fixed;
     width:calc(var(--s) / 3);
    }
    
    .result {
     margin-top: 15px;
    }
    pre { 
     background:#222222;
     padding:10px;
     border-radius:6px;
     display:inline-block;
     display: block;
     white-space: pre-wrap;
     word-break: break-all;
    }
    div{
     white-space: pre-wrap;
     position:relative;
    }
    #randomwordbar {
     width:100%;
     background:#330000;
    }
  </style>
</head>
<body>
 <input type="text" id="searchInput">
  <button onclick="searchWord()" id = "button_search">search</button>  <div class="result" id="result"></div>
  <div id="to_do">searching veluil word. search verb instead of Interjection and adverb. for example, hello->greet.
  
if searched word is not found then change expresison. for example, where -> location</div>
    
  <script>
   
    
    
    let dic=``;
    let lines=``;
    let randomwordbar=document.createElement("div")
    
    const url = "https://raw.githubusercontent.com/Fhres126/w/main/co.txt";
    
    randomwordbar.id="randomwordbar"
    
    

        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error("we met error we cant find txt file.");
                return response.text();
            })
            .then(text => {
                dic=text;
                dic=dic.substring(dic.indexOf('//ewo'), dic.indexOf('//eewo'));
                lines = dic.split(/\r?\n/);
            })
            .catch(err => {
                dic=err;
                lines = dic.split(/\r?\n/);
            });
    function searchWord() {
      let inputRaw = document.getElementById("searchInput").value.trim();
      let resultDiv = document.getElementById("result");
      resultDiv.innerHTML = "";

      if (inputRaw) {
        let input = inputRaw;
        let results = [];
  
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i];
          if (!line) continue;
  
          let parts = line.split('=');
          if (parts.length < 2) continue;
  
          let rhs = parts.slice(0).join('');
  
          let beforeDot = rhs.split('.')[0];
  
          let tokens = beforeDot.split(/[^A-Za-z0]+/).filter(Boolean);
  
          let matched = false;
          for (let t of tokens) {
            if (t.startsWith(input)) { 
              matched = true;
              break;
            }
          }
          
          if(line.split("=")[1].startsWith(input)){
           matched=true;
          }else{
           
          }
          for(let j = 0;j<line.split(" ").length;j++){
            if(line.split(" ")[j].startsWith(input)){
             matched=true;
            }
           }
  
          if (matched) {
            results.push(line.trim());
          }
        }
        
       
  
        if (results.length > 0){
          let unique = [...new Set(results)];
          resultDiv.innerHTML = `<b>searrch result:</b><br>` + unique.map(r => `<pre>${r}</pre>`).join('');} else {
         resultDiv.innerHTML = "result is undefined";
       }
      }else{
       
      }

      
     
     randomwordbar.style=`width:${100}%;`;
     
     randomwordbar.textContent="teaching random word:"
     
     for(let i=0;i<8;i++){
      let randomint = Math.floor(Math.random() * lines.length);
      
      if(lines[randomint].includes("=")){
       randomwordbar.textContent += "\n\n" + lines[randomint]
      }else{
       i--;
      }
      
     }
     
     document.body.appendChild(randomwordbar)
     
   }

   let width=window.innerWidth;
   
    let height=window.innerHeight;
    
    let smallerline;
    
    if(width>height){
      smallerline=height;
    }else{
      smallerline=width;
    }
    document.documentElement.style.setProperty("--s", String(smallerline));
    
    //document.getElementById("searchInput").style.width=String(Number(getComputedStyle(document.documentElement).getPropertyValue("--s"))/2)+"px";
    
    document.documentElement.style.setProperty("--fontsize", String(smallerline * 0.05) + "px");
    
    document.getElementById("searchInput").style.top="0px"
    
    document.getElementById("searchInput").style.zIndex="9999";
    
    document.getElementById("button_search").style.top=parseFloat(document.getElementById("searchInput").getBoundingClientRect().top) + parseFloat(document.getElementById("searchInput").offsetHeight) + "px"
     
     document.getElementById("button_search").style.zIndex="9999";
    
    document.getElementById("to_do").style.top = parseFloat(document.getElementById("button_search").getBoundingClientRect().top) + parseFloat(document.getElementById("button_search").offsetHeight) + "px"
  </script>
</body>
</html>
